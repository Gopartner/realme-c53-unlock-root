name: Test Python

on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'pyproject.toml']
  pull_request:
    paths: ['src/**', 'tests/**', 'pyproject.toml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v
