name: Build KernelSU LKM for Realme C53 (RMX3760)

on:
  workflow_dispatch:
    inputs:
      localversion:
        description: 'CONFIG_LOCALVERSION suffix (e.g. -g0c749b198e8d-ab44). Leave empty for clean 5.15.178-android13-8'
        required: false
        default: ''
        type: string
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc \
          libelf-dev build-essential bison flex libssl-dev dwarves

    - name: Checkout repo (for reference .config)
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Clone ACK android14-5.15 kernel
      run: |
        git clone --depth 1 --branch android14-5.15 \
          https://android.googlesource.com/kernel/common \
          kernel_source

    - name: Fix kernel version to match device (5.15.178-android13-8)
      run: |
        cd kernel_source
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = -android13-8/' Makefile

    - name: Add KernelSU-Next source
      run: |
        cd kernel_source
        git clone --depth 1 --branch dev https://github.com/KernelSU-Next/KernelSU-Next.git
        mkdir -p drivers/kernelsu
        cp -r KernelSU-Next/kernel/* drivers/kernelsu/
        # Fix uapi symlink: kernel/include/uapi -> ../../uapi/
        # Resolve it so the copied files are self-contained
        if [ -L "drivers/kernelsu/include/uapi" ]; then
          rm drivers/kernelsu/include/uapi
          cp -r KernelSU-Next/uapi drivers/kernelsu/include/uapi
        fi
        # Insert Kconfig reference before the last endmenu in drivers/Kconfig
        grep -q "source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig || \
          sed -i '${/^endmenu$/i\source "drivers/kernelsu/Kconfig"\n}' drivers/Kconfig

    - name: Configure kernel with GKI defconfig + KSU
      run: |
        cd kernel_source
        # GKI defconfig has KPROBES=y (needed for KSU kprobe hooking) and EXT4_FS=y
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        # Disable LOCALVERSION_AUTO so we control the exact version string
        echo "CONFIG_LOCALVERSION_AUTO=n" >> .config
        # Set LOCALVERSION: if user provided one, use it; otherwise empty (clean 5.15.178-android13-8)
        LOCALVER="${{ inputs.localversion || '' }}"
        echo "CONFIG_LOCALVERSION=\"$LOCALVER\"" >> .config
        # Enable KernelSU as module
        echo "CONFIG_KSU=m" >> .config
        # Regenerate config
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
        # Display the final UTS_RELEASE for verification
        grep "UTS_RELEASE" include/generated/utsrelease.h 2>/dev/null || true

    - name: Build full kernel (generates Module.symvers, flask.h, etc.)
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
      timeout-minutes: 30

    - name: Build kernelsu.ko as external module
      run: |
        cd kernel_source
        # KBUILD_MODPOST_WARN=1: KSU resolves internal symbols at runtime via kallsyms
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          KCFLAGS="-Wno-unused-value" \
          KBUILD_MODPOST_WARN=1 \
          M=drivers/kernelsu modules

    - name: Extract and display vermagic
      run: |
        KSU_KO=$(find kernel_source -name "kernelsu.ko" -type f 2>/dev/null | head -1)
        if [ -z "$KSU_KO" ]; then
          echo "kernelsu.ko not found!"
          find kernel_source -name "*.ko" -type f 2>/dev/null | head -20
          exit 1
        fi
        echo "=== Module info ==="
        modinfo "$KSU_KO"
        echo ""
        echo "=== Vermagic ==="
        modinfo -F vermagic "$KSU_KO"
        echo ""
        echo "=== Device vermagic (expected) ==="
        echo "Run on device: cat /sys/module/hello/sections/vermagic 2>/dev/null || cat /proc/version"
        echo "Or: adb shell 'cat /proc/version || uname -a'"
        ls -lh "$KSU_KO"

    - name: Upload kernelsu.ko as artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernelsu_rmx3760
        path: kernel_source/drivers/kernelsu/kernelsu.ko
        if-no-files-found: error
