name: Build KernelSU LKM for Realme C53

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc libelf-dev build-essential bison flex libssl-dev dwarves

    - name: Checkout repo (for .config)
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Clone ACK android14-5.15 kernel
      run: |
        git clone --depth 1 --branch android14-5.15 \
          https://android.googlesource.com/kernel/common \
          kernel_source

    - name: Fix kernel version to match device (5.15.178-android13-8)
      run: |
        cd kernel_source
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = -android13-8/' Makefile

    - name: Add KernelSU-Next source (Kconfig only — not in Makefile)
      run: |
        cd kernel_source
        git clone --depth 1 --branch dev https://github.com/KernelSU-Next/KernelSU-Next.git
        mkdir -p drivers/kernelsu
        cp -r KernelSU-Next/kernel/* drivers/kernelsu/
        cp -r KernelSU-Next/uapi drivers/kernelsu/
        # Add Kconfig only (so CONFIG_KSU=m survives olddefconfig)
        # Do NOT add to drivers/Makefile — builds as external module after full kernel
        grep -q "source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig || \
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

    - name: Configure kernel with GKI defconfig + KSU symbol
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
        # Add CONFIG_KSU=m so Module.symvers includes KSU symbols for external build
        echo "CONFIG_KSU=m" >> .config
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Build full kernel (generates Module.symvers, flask.h, etc.)
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
      timeout-minutes: 30

    - name: Build kernelsu.ko as external module
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          KCFLAGS="-Wno-unused-value" \
          M=drivers/kernelsu modules

    - name: Locate kernelsu.ko
      run: |
        find kernel_source -name "kernelsu.ko" -type f 2>/dev/null | head -5

    - name: Check built module
      run: |
        KSU_KO=$(find kernel_source -name "kernelsu.ko" -type f 2>/dev/null | head -1)
        if [ -z "$KSU_KO" ]; then
          echo "kernelsu.ko not found!"
          ls -la kernel_source/drivers/kernelsu/ 2>/dev/null || echo "drivers/kernelsu/ does not exist"
          find kernel_source -name "*.ko" -type f 2>/dev/null | head -20
          exit 1
        fi
        echo "Module found: $KSU_KO"
        modinfo "$KSU_KO"
        ls -lh "$KSU_KO"

    - name: Upload module as artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernelsu_rmx3760
        path: kernel_source/drivers/kernelsu/kernelsu.ko
        if-no-files-found: error
