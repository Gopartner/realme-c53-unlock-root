name: Build KernelSU LKM for Realme C53

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc

    - name: Checkout repo (for .config)
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Clone ACK android14-5.15 kernel
      run: |
        git clone --depth 1 --branch android14-5.15 \
          https://android.googlesource.com/kernel/common \
          kernel_source

    - name: Fix kernel version to match device (5.15.178-android13-8)
      run: |
        cd kernel_source
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = -android13-8/' Makefile

    - name: Copy device .config
      run: |
        cp repo/.config kernel_source/.config

    - name: Add KernelSU-Next
      run: |
        cd kernel_source
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -

    - name: Configure kernel with olddefconfig
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Build modules_prepare
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

    - name: Build KernelSU module
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=KernelSU modules

    - name: Check module vermagic
      run: |
        ls -lh kernel_source/KernelSU/kernelsu.ko
        modinfo kernel_source/KernelSU/kernelsu.ko

    - name: Upload module as artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernelsu_rmx3760
        path: kernel_source/KernelSU/kernelsu.ko
        if-no-files-found: error
