name: Build & Create Complete Release
on:
  workflow_dispatch:
    inputs:
      localversion:
        description: 'Extra vermagic suffix. Leave empty for 5.15.178-android13-8'
        required: false
        default: ''
      stock_boot_url:
        description: 'URL to download stock boot.img (for full release with ready-to-flash image)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc \
          libelf-dev build-essential bison flex libssl-dev dwarves zip

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Clone ACK android14-5.15 kernel
      run: |
        git clone --depth 1 --branch android14-5.15 \
          https://android.googlesource.com/kernel/common \
          kernel_source

    - name: Set kernel version to 5.15.178-android13-8
      run: |
        cd kernel_source
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = -android13-8/' Makefile

    - name: Add KernelSU-Next source
      run: |
        cd kernel_source
        git clone --depth 1 --branch dev https://github.com/KernelSU-Next/KernelSU-Next.git
        mkdir -p drivers/kernelsu
        cp -r KernelSU-Next/kernel/* drivers/kernelsu/
        if [ -L "drivers/kernelsu/include/uapi" ]; then
          rm drivers/kernelsu/include/uapi
          cp -r KernelSU-Next/uapi drivers/kernelsu/include/uapi
        fi
        grep -q "source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig || \
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

    - name: Configure kernel
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        scripts/config --disable LOCALVERSION_AUTO
        LOCALVER="${{ inputs.localversion || '' }}"
        scripts/config --set-str LOCALVERSION "-android13-8$LOCALVER"
        scripts/config --module KSU
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Build full kernel
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
      timeout-minutes: 30

    - name: Build kernelsu.ko
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          KCFLAGS="-Wno-unused-value" \
          KBUILD_MODPOST_WARN=1 \
          M=drivers/kernelsu modules

    - name: Extract vermagic
      id: extract
      run: |
        KSU_KO=$(find kernel_source -name "kernelsu.ko" -type f | head -1)
        echo "vermagic=$(modinfo -F vermagic "$KSU_KO")" >> "$GITHUB_OUTPUT"
        mkdir -p staging/kernelsu
        cp "$KSU_KO" staging/kernelsu/

    - name: Build patched boot image (if stock URL provided)
      if: inputs.stock_boot_url != ''
      run: |
        curl -L -o stock_boot.img "${{ inputs.stock_boot_url }}"
        python repo/release/build_release.py \
          --kernelsu staging/kernelsu/kernelsu.ko \
          --stock stock_boot.img

    - name: Build full release package
      run: |
        mkdir -p staging/complete
        VERMAGIC="${{ steps.extract.outputs.vermagic }}"

        # 1. Patched boot image (ready to flash)
        if [ -f "repo/release/runtime/kernelsu_patched_boot.img" ]; then
          cp repo/release/runtime/kernelsu_patched_boot.img staging/complete/
        fi

        # 2. Kernel module
        cp staging/kernelsu/kernelsu.ko staging/complete/

        # 3. Unlock tool
        cp -r repo/tools/unlock staging/complete/unlock/

        # 4. APK
        cp -r repo/tools/apk staging/complete/apk/

        # 5. Flash scripts
        cat > staging/complete/flash.bat << 'BAT'
@echo off
REM ============================================
REM Realme C53 KernelSU Flash Tool
REM ============================================
echo Realme C53 (RMX3760) - Flash KernelSU Boot
echo.
adb get-state >nul 2>&1
if %ERRORLEVEL% neq 0 (
    echo [ERROR] No device detected.
    echo Enable USB debugging and connect your phone.
    pause
    exit /b 1
)
echo [1/4] Rebooting to fastboot...
adb reboot bootloader
ping -n 6 127.0.0.1 >nul
echo [2/4] Flashing boot_a...
fastboot flash boot_a kernelsu_patched_boot.img
if %ERRORLEVEL% neq 0 (
    echo [ERROR] Flash failed. Is bootloader unlocked?
    pause
    exit /b 1
)
echo [3/4] Flashing boot_b...
fastboot flash boot_b kernelsu_patched_boot.img
echo [4/4] Rebooting...
fastboot reboot
echo.
echo Done! After reboot, install APK:
echo   adb install apk/KernelSU_Next.apk
echo.
pause
BAT

        cat > staging/complete/flash.sh << 'SH'
#!/bin/bash
# Realme C53 (RMX3760) - Flash KernelSU Boot
set -e
echo "Realme C53 (RMX3760) - Flash KernelSU Boot"
adb get-state >/dev/null 2>&1 || { echo "Device not detected"; exit 1; }
echo "[1/4] Rebooting to fastboot..."
adb reboot bootloader
sleep 5
echo "[2/4] Flashing boot_a..."
fastboot flash boot_a kernelsu_patched_boot.img
echo "[3/4] Flashing boot_b..."
fastboot flash boot_b kernelsu_patched_boot.img
echo "[4/4] Rebooting..."
fastboot reboot
echo "Done! Install APK: adb install apk/KernelSU_Next.apk"
SH
        chmod +x staging/complete/flash.sh

        # 6. README
        cat > staging/complete/README.txt << 'EOF'
========================================
  Realme C53 (RMX3760) KernelSU Release
========================================

Kernel: 5.15.178-android13-8
EOF
        echo "Vermagic: $VERMAGIC" >> staging/complete/README.txt
        cat >> staging/complete/README.txt << 'EOF'

=== CONTENTS ===

kernelsu_patched_boot.img   - Ready-to-flash boot image
kernelsu.ko                  - KernelSU LKM module
unlock/                      - Bootloader unlock tool (CVE-2022-38694)
apk/KernelSU_Next.apk        - KernelSU Next app
flash.bat / flash.sh         - One-click flash scripts

=== UNLOCK BOOTLOADER (first time only) ===

1. Install SPRD driver (tools/driver/ in repo)
2. Power off phone, connect USB
3. Open unlock/ folder, run:
     spd_dump.exe dump 0x00000000 0x00002000 pgpt.bin
     spd_dump.exe dump 0x00002000 0x00006000 splloader.bin
     spd_dump.exe dump 0x0000c000 0x00004000 uboot_a.bin
     gen_spl-unlock.exe uboot_a.bin
     spd_dump.exe erase 0x00002000 0x00006000
     spd_dump.exe write 0x00002000 rmx3762/fdl2-cboot.bin
   (screwdriver trick: hold both vol + tap power 1s)
     spd_dump.exe write 0x00002000 spl-unlock.bin
     spd_dump.exe write 0x00002000 u-boot-spl-16k-sign.bin
     spd_dump.exe write 0x0000c000 uboot_bak.bin
     spd_dump.exe erase 0x0000e000 0x00002000

Phone will factory reset. Set up Android, enable USB debugging.

=== FLASH (after unlock) ===

Windows: double-click flash.bat
Linux:   ./flash.sh

Or manually:
  adb reboot bootloader
  fastboot flash boot_a kernelsu_patched_boot.img
  fastboot flash boot_b kernelsu_patched_boot.img
  fastboot reboot

After reboot:
  adb install apk/KernelSU_Next.apk
  Open app -> Superuser -> Grant Shell

=== VERIFY ===

adb shell su -c id
# Should show: uid=0(root)

=== CREDITS ===

Built with: https://github.com/Gopartner/realme-c53-unlock-root
Exploit: TomKing062 (CVE-2022-38694)
KernelSU: KernelSU-Next
EOF

        # 7. Create zip
        cd staging/complete
        zip -r "../../RMX3760_KernelSU_Release.zip" ./*
        cd ../..

    - name: Upload complete release artifact
      uses: actions/upload-artifact@v4
      with:
        name: RMX3760_KernelSU_Release
        path: RMX3760_KernelSU_Release.zip

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERMAGIC="${{ steps.extract.outputs.vermagic }}"
        TAG_NAME="release-$(date +'%Y%m%d-%H%M%S')"

        # Build release notes
        NOTES="## Realme C53 (RMX3760) - Complete Release Package

        **Kernel:** 5.15.178-android13-8
        **Vermagic:** $VERMAGIC

        ### [Package] Included

        | Item | Description |
        |------|-------------|
        | \`kernelsu_patched_boot.img\` | Ready-to-flash boot image |
        | \`kernelsu.ko\` | KernelSU LKM module |
        | \`unlock/\` | Bootloader unlock tool (CVE-2022-38694) |
        | \`apk/\` | KernelSU Next APK |
        | \`flash.bat\` / \`flash.sh\` | One-click flash scripts |
        | \`README.txt\` | Full instructions"

        if [ -z "${{ inputs.stock_boot_url }}" ]; then
          NOTES="$NOTES

        ### [Warning] No patched boot image

        This release only contains the kernel module. To get a ready-to-flash image:
        1. Clone the repo: \`git clone https://github.com/${{ github.repository }}.git\`
        2. Place \`kernelsu.ko\` in \`downloads/\`
        3. Backup stock boot: \`python cli.py\` -> menu 3
        4. Build: \`python release/build_release.py --kernelsu downloads/kernelsu.ko --stock ...\`
        5. Flash: \`python cli.py\` -> menu 6"
        fi

        NOTES="$NOTES

        ### [Quick] Flash (if boot image included)

        1. Extract the zip
        2. Connect phone with USB debugging enabled
        3. Run \`flash.bat\` (Windows) or \`./flash.sh\` (Linux)

        ### [Reuse]

        Same \`kernelsu.ko\` works as long as kernel version doesn't change.
        Just backup fresh stock boot and rebuild the patched image."

        gh release create "$TAG_NAME" \
          --repo "${{ github.repository }}" \
          --title "RMX3760 Release $TAG_NAME" \
          --notes "$NOTES" \
          RMX3760_KernelSU_Release.zip
