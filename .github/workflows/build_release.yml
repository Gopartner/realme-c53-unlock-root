name: Build & Release

on:
  workflow_dispatch:
    inputs:
      localversion:
        description: 'Extra vermagic suffix (e.g. -g0c749b198e8d-ab44). Leave empty for default'
        required: false
        default: ''
        type: string
  push:
    branches: [main]

jobs:
  build-kernelsu:
    name: Build kernelsu.ko
    runs-on: ubuntu-latest
    outputs:
      vermagic: ${{ steps.extract.outputs.vermagic }}

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc \
          libelf-dev build-essential bison flex libssl-dev dwarves

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Clone ACK android14-5.15
      run: |
        git clone --depth 1 --branch android14-5.15 \
          https://android.googlesource.com/kernel/common \
          kernel_source

    - name: Fix kernel version
      run: |
        cd kernel_source
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 178/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION = -android13-8/' Makefile

    - name: Add KernelSU-Next source
      run: |
        cd kernel_source
        git clone --depth 1 --branch dev https://github.com/KernelSU-Next/KernelSU-Next.git
        mkdir -p drivers/kernelsu
        cp -r KernelSU-Next/kernel/* drivers/kernelsu/
        if [ -L "drivers/kernelsu/include/uapi" ]; then
          rm drivers/kernelsu/include/uapi
          cp -r KernelSU-Next/uapi drivers/kernelsu/include/uapi
        fi
        grep -q "source \"drivers/kernelsu/Kconfig\"" drivers/Kconfig || \
          sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig

    - name: Configure kernel
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
        scripts/config --disable LOCALVERSION_AUTO
        LOCALVER="${{ inputs.localversion || '' }}"
        scripts/config --set-str LOCALVERSION "-android13-8$LOCALVER"
        scripts/config --module KSU
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

    - name: Build full kernel
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
      timeout-minutes: 30

    - name: Build kernelsu.ko
      run: |
        cd kernel_source
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          KCFLAGS="-Wno-unused-value" \
          KBUILD_MODPOST_WARN=1 \
          M=drivers/kernelsu modules

    - name: Extract vermagic
      id: extract
      run: |
        KSU_KO=$(find kernel_source -name "kernelsu.ko" -type f | head -1)
        echo "vermefic=$(modinfo -F vermagic "$KSU_KO")" >> "$GITHUB_OUTPUT"
        mkdir -p release-artifacts
        cp "$KSU_KO" release-artifacts/

    - name: Upload kernelsu.ko
      uses: actions/upload-artifact@v4
      with:
        name: kernelsu_rmx3760
        path: release-artifacts/kernelsu.ko

  build-release:
    name: Build release image
    needs: build-kernelsu
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download kernelsu.ko
      uses: actions/download-artifact@v4
      with:
        name: kernelsu_rmx3760
        path: release-artifacts/

    - name: Download ksud for Linux
      run: |
        mkdir -p release/runtime/.host_tools
        curl -L -o release/runtime/.host_tools/ksud \
          "https://github.com/KernelSU-Next/KernelSU-Next/releases/download/v3.2.0/ksud-x86_64-linux-gnu"
        chmod +x release/runtime/.host_tools/ksud

    - name: Patch boot image with KernelSU
      run: |
        python release/build/host_patch.py \
          --kernelsu release-artifacts/kernelsu.ko \
          --stock release-artifacts/stock_boot.img \
          -o release/runtime/kernelsu_patched_boot.img \
          --ksud release/runtime/.host_tools/ksud

    - name: Verify artifact
      run: python release/build/verify_release.py

    - name: Upload patched boot image
      uses: actions/upload-artifact@v4
      with:
        name: kernelsu_rmx3760_patched_boot
        path: release/runtime/kernelsu_patched_boot.img

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="release-$(date +'%Y%m%d-%H%M%S')"
        gh release create "$TAG_NAME" \
          --repo "${{ github.repository }}" \
          --title "Release $TAG_NAME" \
          --notes "## Realme C53 (RMX3760) Release

        ### Included
        - kernelsu.ko (KernelSU LKM module)
        - kernelsu_patched_boot.img (flashable boot image)

        ### Flash
        Download the patched boot image and flash with fastboot:
        \`\`\`
        fastboot flash boot_a kernelsu_patched_boot.img
        fastboot flash boot_b kernelsu_patched_boot.img
        \`\`\`

        Or use the CLI tool: \`python cli.py\` → option 6

        ### Device Info
        - Kernel: ${{ needs.build-kernelsu.outputs.vermagic }}
        - Model: RMX3760" \
          release-artifacts/kernelsu.ko \
          release/runtime/kernelsu_patched_boot.img
