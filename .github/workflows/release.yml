name: Build RMX3760 Release
on:
  workflow_dispatch:
    inputs:
      localversion:
        required: false
        default: ''
      stock_boot_url:
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl lz4 gcc-aarch64-linux-gnu bc \
            libelf-dev build-essential bison flex libssl-dev dwarves zip
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo
      - name: Clone ACK kernel
        run: |
          git clone --depth 1 --branch android14-5.15 \
            https://android.googlesource.com/kernel/common kernel_source
