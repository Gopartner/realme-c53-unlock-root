name: Build RMX3760 Release
on:
  workflow_dispatch:
    inputs:
      localversion:
        required: false
        default: ''
      stock_boot_url:
        required: false
        default: ''
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - run: echo hello > test.txt
      - name: Test step
        run: cat test.txt
      - name: Test timeout
        run: sleep 1
        timeout-minutes: 30
      - name: Test if
        if: inputs.localversion != ''
        run: echo "has localversion"
